worker_processes auto;
worker_rlimit_nofile 20000;

events {
    worker_connections 10240;
}

http {
    # --- PORT EXHAUSTION: Gestione Intelligente Connessioni ---
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      "";
    }

    # --- PERFORMANCE: Connection Pool ---
    upstream frontend_backend {
        server frontend:8501;
        keepalive 100; # Mantiene aperte 100 connessioni inattive per il riutilizzo
    }

    # --- 1. CONFIGURAZIONE VIP ---
    geo $is_vip {
        default 0;        # Default: LIMITA tutto il traffico (Sicurezza attiva)
        
        # --- WHITELIST ---
        
        127.0.0.1 1;      # Localhost
        
        # Questa riga sblocca i pod (10.244.x.x sono inclusi qui dentro)
        10.0.0.0/8 1;     
        
        # Altre reti private standard (per sicurezza Docker/Host)
        172.16.0.0/12 1;  
        192.168.0.0/16 1;
    }

    map $is_vip $limit_key {
        0 $binary_remote_addr;
        1 "";
    }

    limit_req_zone $limit_key zone=api_limit:10m rate=10r/s;
    limit_conn_zone $limit_key zone=conn_limit:10m;

    server {
        listen 80;
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        client_body_timeout 60s;
        client_header_timeout 60s;
        
        limit_conn conn_limit 20;
        limit_req_status 429;
        limit_conn_status 429;

        # ============================================================
        # ### FIX ZAP (Security Headers) ###
        # ============================================================
        
        # 1. Anti-Clickjacking: Impedisce al sito di essere messo in un iframe da altri siti
        add_header X-Frame-Options "SAMEORIGIN" always;

        # 2. Anti-MIME Sniffing: Impedisce al browser di "indovinare" il tipo di file (risolve alert Low)
        add_header X-Content-Type-Options "nosniff" always;

        # 3. Permissions Policy: Blocca accesso a camera/mic (risolve un altro alert Low)
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        
        # ============================================================

        # --- 1. FRONTEND (Streamlit) ---
        location / {
            limit_req zone=api_limit burst=50 nodelay;
            
            # USA L'UPSTREAM DEFINITO SOPRA
            proxy_pass http://frontend_backend; 
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            proxy_http_version 1.1;
            
            # --- Header dinamici invece di forzati ---
            # Questo permette il Keep-Alive per wrk e WebSockets per Streamlit
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # ---------------------------------------------

            proxy_connect_timeout 75s;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        # --- 2. STREAMLIT STATIC FILES ---
        location /_stcore/stream {
            proxy_pass http://frontend_backend/_stcore/stream; 
            
            proxy_http_version 1.1;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }

        # --- 3. AUTH SERVICE (API) ---
        location /api/auth/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://auth-service:5001/;
            proxy_http_version 1.1;  
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- 4. REPORT SERVICE (API) ---
        location /api/report/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://report-service:5002/;
            proxy_http_version 1.1; 
            proxy_set_header Connection ""; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}